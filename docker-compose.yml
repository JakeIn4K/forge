services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-forge}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-forge}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      SPRING_DATA_REDIS_HOST: redis
      FORGE_API_KEYS: ${FORGE_API_KEYS:-dev-key}
      FORGE_RATE_LIMIT_CAPACITY: ${FORGE_RATE_LIMIT_CAPACITY:-200}
      FORGE_RATE_LIMIT_REFILL_PER_SECOND: ${FORGE_RATE_LIMIT_REFILL_PER_SECOND:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: worker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-forge}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-forge}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      SPRING_DATA_REDIS_HOST: redis
      FORGE_WORKER_THREADS: ${FORGE_WORKER_THREADS:-4}
      FORGE_WORKER_POLL_INTERVAL: ${FORGE_WORKER_POLL_INTERVAL:-500ms}
      FORGE_WORKER_CLAIM_BATCH: ${FORGE_WORKER_CLAIM_BATCH:-10}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      POSTGRES_DB: ${POSTGRES_DB:-forge}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
