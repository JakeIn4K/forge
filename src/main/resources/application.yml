spring:
  application:
    name: forge
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/forge}
    username: ${SPRING_DATASOURCE_USERNAME:forge}
    password: ${SPRING_DATASOURCE_PASSWORD:forge}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  mvc:
    problemdetails:
      enabled: true

forge:
  api:
    keys: ${FORGE_API_KEYS:dev-key}
  rate-limit:
    capacity: ${FORGE_RATE_LIMIT_CAPACITY:200}
    refill-per-second: ${FORGE_RATE_LIMIT_REFILL_PER_SECOND:100}
  idempotency:
    ttl: 24h
  retry:
    base-delay: ${FORGE_RETRY_BASE_DELAY:1s}
    max-delay: ${FORGE_RETRY_MAX_DELAY:10m}
  worker:
    threads: ${FORGE_WORKER_THREADS:4}
    poll-interval: ${FORGE_WORKER_POLL_INTERVAL:500ms}
    queue: ${FORGE_WORKER_QUEUE:default}
    heartbeat-interval: ${FORGE_WORKER_HEARTBEAT_INTERVAL:5s}
    heartbeat-ttl: ${FORGE_WORKER_HEARTBEAT_TTL:15s}
    visibility-timeout: ${FORGE_WORKER_VISIBILITY_TIMEOUT:30s}
    reap-interval: ${FORGE_WORKER_REAP_INTERVAL:10s}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
