spring:
  application:
    name: forge
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/forge}
    username: ${SPRING_DATASOURCE_USERNAME:forge}
    password: ${SPRING_DATASOURCE_PASSWORD:forge}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  mvc:
    problemdetails:
      enabled: true

forge:
  idempotency:
    ttl: 24h

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
